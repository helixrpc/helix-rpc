site_name: Helix RPC
site_description: The next-generation AI infrastructure framework for maximum efficiency.
repo_url: https://github.com/helixrpc/helix-rpc
repo_name: helixrpc/helix-rpc

theme:
  name: material
  logo: assets/logo.png
  favicon: assets/logo.png
  palette:
    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: cyan
    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: cyan
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - toc.integrate
    - search.suggest
    - search.highlight
    - content.code.copy

extra_css:
  - assets/extra.css

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - admonition
  - pymdownx.details
  - pymdownx.tasklist:
      custom_checkbox: true
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Setup & Configuration: setup-configuration.md
  - Architecture: architecture.md
  - Features: features.md
  - Language Support: languages.md
  - Tutorials: tutorials.md
  - LLM Token Serving: llm-serving.md
  - Examples: examples.md
  - Developer Guide: developer-guide.md
  - Integrations: integrations.md
  - Enterprise Concerns: enterprise-concerns.md
  - Benchmarks: benchmarks.md
