site_name: Helix RPC
site_description: The next-generation AI infrastructure framework for maximum efficiency.
repo_url: https://github.com/helixrpc/helix-rpc
repo_name: helixrpc/helix-rpc

theme:
  name: material
  logo: assets/logo.png
  favicon: assets/logo.png
  palette:
    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: cyan
    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: cyan
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - toc.integrate
    - search.suggest
    - search.highlight
    - content.code.copy

extra_css:
  - assets/extra.css

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.arithmatex:
      generic: true
  - admonition
  - pymdownx.details
  - pymdownx.tasklist:
      custom_checkbox: true
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Setup & Configuration: setup-configuration.md
  - Architecture: architecture.md
  - Features: features.md
  - Language Support: languages.md
  - Tutorials: tutorials.md
  - LLM Token Serving: llm-serving.md
  - Examples: examples.md
  - Developer Guide: developer-guide.md
  - Integrations: integrations.md
  - Benchmarks: benchmarks.md
  - Blog:
      - Overview: blog/index.md
      - Introducing Helix RPC: blog/introducing-helix-rpc.md
      - Deep-Dive Advanced Optimizations: blog/deep-dive-advanced-optimizations.md
      - Helix vs. Alternatives: blog/helix-vs-alternatives.md

