syntax = "proto3";

package openai.chat;

option go_package = "github.com/helix-rpc/helix/integration-tests/schema/openai_chat";

message ChatMessage {
  string role = 1;
  string content = 2;
}

message ChatCompletionRequest {
  string model = 1;
  repeated ChatMessage messages = 2;
  bool stream = 3;
}

message ChatCompletionChoice {
  int32 index = 1;
  ChatMessage message = 2;
  ChatMessage delta = 3; // For streaming
  string finish_reason = 4;
}

message ChatCompletionResponse {
  string id = 1;
  string object = 2;
  int64 created = 3;
  string model = 4;
  repeated ChatCompletionChoice choices = 5;
}

service ChatCompletionService {
  // Unary completion
  rpc CreateChatCompletion(ChatCompletionRequest) returns (ChatCompletionResponse) {}
  
  // Streaming completion
  rpc StreamChatCompletion(ChatCompletionRequest) returns (stream ChatCompletionResponse) {}
}
