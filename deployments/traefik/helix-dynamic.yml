http:
  routers:
    helix-router:
      rule: "Host(`api.helixrpc.io`)"
      service: helix-service
      # Enable HTTP/2 (h2c) for gRPC and allow HTTP/1.1 Upgrade for WebSockets
      # Traefik handles this automatically on a single router if the backend supports it!
      entryPoints:
        - web
        - websecure

  services:
    helix-service:
      loadBalancer:
        servers:
          - url: "h2c://127.0.0.1:8080" # h2c scheme allows cleartext HTTP/2 for gRPC while falling back to HTTP/1.1
        # Pass host header to preserve routing
        passHostHeader: true
