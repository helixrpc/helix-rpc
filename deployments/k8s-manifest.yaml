apiVersion: apps/v1
kind: Deployment
metadata:
  name: helix-service
  labels:
    app: helix-service
spec:
  replicas: 3
  selector:
    matchLabels:
      app: helix-service
  template:
    metadata:
      labels:
        app: helix-service
      annotations:
        # Standard Prometheus scraping annotations
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: helix-app
        image: my-registry/helix-service:latest
        ports:
        - containerPort: 8080
          name: http-grpc
        resources:
          limits:
            cpu: "2"
            memory: 2Gi
          requests:
            cpu: "1"
            memory: 1Gi
        # Standard Kubernetes gRPC Liveness Probe
        livenessProbe:
          grpc:
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          grpc:
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: helix-service
spec:
  ports:
  - port: 8080
    targetPort: 8080
    name: http-grpc
  selector:
    app: helix-service
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: helix-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: helix-service
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 75
