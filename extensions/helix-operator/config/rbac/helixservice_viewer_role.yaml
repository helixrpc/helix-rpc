# This rule is not used by the project helix-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to orchestration.helixrpc.io resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: helix-operator
    app.kubernetes.io/managed-by: kustomize
  name: helixservice-viewer-role
rules:
- apiGroups:
  - orchestration.helixrpc.io
  resources:
  - helixservices
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - orchestration.helixrpc.io
  resources:
  - helixservices/status
  verbs:
  - get
