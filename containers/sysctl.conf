# Helix RPC Kernel Tuning Parameters
# Place or load these to optimize network throughput and minimize latency.

# Increase maximum number of open files (file descriptors)
fs.file-max = 2097152

# Increase max socket backlogs for high concurrency
net.core.somaxconn = 65535
net.ipv4.tcp_max_syn_backlog = 65535

# Enable TCP Fast Open (value 3 enables both client and server)
net.ipv4.tcp_fastopen = 3

# TCP socket buffer sizes (min, default, max in bytes)
net.ipv4.tcp_rmem = 4096 87380 16777216
net.ipv4.tcp_wmem = 4096 65536 16777216

# Enable TCP BBR Congestion Control (requires Linux 4.9+)
net.core.default_qdisc = fq
net.ipv4.tcp_congestion_control = bbr

# Keep-alive tuning: detect dead connections faster
net.ipv4.tcp_keepalive_time = 300
net.ipv4.tcp_keepalive_intvl = 15
net.ipv4.tcp_keepalive_probes = 5

# Disable TCP slow start after idle to prevent latency spikes
net.ipv4.tcp_slow_start_after_idle = 0
