syntax = "proto3";
package keyval;

message GetRequest {
  string key = 1;
}

message GetResponse {
  string value = 2;
  bool found = 3;
}

message SetRequest {
  string key = 1;
  string value = 2;
}

message SetResponse {
  bool success = 1;
}

service KVService {
  rpc Get(GetRequest) returns (GetResponse);
  rpc Set(SetRequest) returns (SetResponse);
}
