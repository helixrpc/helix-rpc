name: Go CI

on:
  push:
    branches: [ "main" ]
    paths:
      - 'runtimes/go/**'
      - 'compiler/**'
      - 'tests/go/**'
      - '.github/workflows/ci-go.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'runtimes/go/**'
      - 'compiler/**'
      - 'tests/go/**'
      - '.github/workflows/ci-go.yml'

jobs:
  go-tests:
    name: Go Unit & Integration Tests (Data Race)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Go Runtime Tests (with -race)
        working-directory: ./runtimes/go
        run: go test -v -race ./...
