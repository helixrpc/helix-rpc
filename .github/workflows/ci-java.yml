name: Java CI

on:
  push:
    branches: [ "main" ]
    paths:
      - 'runtimes/java/**'
      - '.github/workflows/ci-java.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'runtimes/java/**'
      - '.github/workflows/ci-java.yml'

jobs:
  java-tests:
    name: Java Compilation & Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build & Run Java Tests
        working-directory: ./runtimes/java
        run: |
          mkdir -p bin
          javac -d bin src/main/java/io/helixrpc/runtime/*.java src/test/java/io/helixrpc/runtime/*.java
          java -cp bin io.helixrpc.runtime.RuntimeTest
