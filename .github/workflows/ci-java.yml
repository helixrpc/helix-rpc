name: Java CI

on:
  push:
    branches: [ "main" ]
    paths:
      - 'runtimes/java/**'
      - '.github/workflows/ci-java.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'runtimes/java/**'
      - '.github/workflows/ci-java.yml'

jobs:
  java-tests:
    name: Java Compilation & Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build & Run Java Tests
        working-directory: ./runtimes/java
        run: |
          mkdir -p bin
          find src -name "*.java" > sources.txt
          javac -d bin @sources.txt
          java -cp bin io.helixrpc.runtime.RuntimeTest
          java -cp bin io.helixrpc.runtime.OptimizationTest
