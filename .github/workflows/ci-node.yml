name: Node.js CI

on:
  push:
    branches: [ "main" ]
    paths:
      - 'runtimes/node/**'
      - 'tests/node/**'
      - '.github/workflows/ci-node.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'runtimes/node/**'
      - 'tests/node/**'
      - '.github/workflows/ci-node.yml'

jobs:
  node-tests:
    name: Node.js TypeCheck & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies & Build
        working-directory: ./runtimes/node
        run: |
          npm install
          npm run build
