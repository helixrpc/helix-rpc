name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  go-tests:
    name: Go Unit & Integration Tests (Data Race)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Go Runtime Tests (with -race)
        working-directory: ./runtime-go
        run: go test -v -race ./...

  rust-tests:
    name: Rust Clippy & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust (Stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Rust Runtime Clippy Check
        working-directory: ./runtime-rust
        run: cargo clippy -- -D warnings

      - name: Rust Runtime Tests
        working-directory: ./runtime-rust
        run: cargo test

  cross-language-integration:
    name: Cross-Language Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Set up Rust (Stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Protoc
        uses: arduino/setup-protoc@v3
        with:
          version: '23.4'
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install pytest aiohttp

      - name: Run Test Harness
        run: |
          chmod +x ./test.sh
          ./test.sh
