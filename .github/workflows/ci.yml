name: Helix RPC CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
      fail-fast: false

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.24.0'

    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'

    - name: Compile Helix Compiler
      run: |
        cd compiler
        go build -o bin/helixc .
        
    - name: Test Go Runtime
      run: |
        cd runtimes/go
        go mod tidy
        go test -v ./...
        
    - name: Test Rust Runtime
      run: |
        cd runtimes/rust
        cargo test --verbose
        
    - name: Test Node.js Runtime
      run: |
        cd runtimes/node
        npm install
        npm run build
        npx jest --config jest.config.js

    - name: Test Python Runtime
      run: |
        cd runtimes/python
        python -m pip install --upgrade pip
        pip install pytest pytest-asyncio aiohttp opentelemetry-api opentelemetry-sdk \
                    aiomcache redis aio-pika aiokafka
        python -m pytest tests/test_cache.py tests/test_ratelimit.py \
                         tests/test_rabbitmq.py tests/test_kafka.py -v
        
    - name: Test Java Runtime
      run: |
        cd runtimes/java
        mvn clean compile

    - name: Test C++ Runtime
      run: |
        ./compiler/bin/helixc generate -idl tests/schema/test.proto -lang cpp -out runtimes/cpp/tests/test_helix_generated.h
        cd runtimes/cpp
        mkdir -p build && cd build
        cmake ..
        cmake --build .
        if [ -f "Debug/test_runtime.exe" ]; then
          ./Debug/test_runtime.exe
          ./Debug/test_optimization.exe
        else
          ./test_runtime
          ./test_optimization
        fi

    - name: Test Kubernetes Operator
      if: runner.os == 'Linux'
      run: |
        cd extensions/helix-operator
        make build
